openapi: 3.0.3
info:
  title: API LDDM - MergeSkills
  description: API do Sistema de Gestão de Aprendizagem para o Curso de Desenvolvimento Mobile
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor de Desenvolvimento Local

tags:
  - name: Cursos
    description: Gerenciamento de cursos e catálogos
  - name: Conteúdo
    description: Lições e questões
  - name: Progresso
    description: Acompanhamento do estudante

paths:
  /courses:
    get:
      tags:
        - Cursos
      summary: Listar todos os cursos
      description: Retorna uma lista com todos os cursos disponíveis.
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
    post:
      tags:
        - Cursos
      summary: Criar um novo curso
      description: Adiciona um novo curso ao catálogo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
      responses:
        '201':
          description: Curso criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Formato de curso inválido

  /courses/{id}:
    put:
      tags:
        - Cursos
      summary: Atualiza um curso
      description: Atualiza os dados de um curso existente.
      parameters:
        - name: id
          in: path
          description: ID do Curso
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
      responses:
        '200':
          description: Curso atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: ID ausente ou inválido
        '404':
          description: Curso não encontrado
    delete:
      tags:
        - Cursos
      summary: Deletar um curso
      description: Remove um curso do catálogo usando seu ID.
      parameters:
        - name: id
          in: path
          description: ID do Curso
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Curso deletado com sucesso
        '400':
          description: ID ausente ou inválido
        '404':
          description: Curso não encontrado

  /courses/{id}/lessons:
    get:
      tags:
        - Conteúdo
      summary: Listar lições de um curso
      description: Retorna todas as lições associadas a um ID de curso específico.
      parameters:
        - name: id
          in: path
          description: ID do Curso
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
        '400':
          description: ID inválido fornecido


  /lessons:
    post:
      tags:
        - Conteúdo
      summary: Criar uma nova lição
      description: Adiciona uma nova lição ao catálogo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lesson'
      responses:
        '201':
          description: Lição criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '400':
          description: Formato de lição inválido

  /lessons/{id}:
    put:
      tags:
        - Conteúdo
      summary: Atualiza uma lição
      description: Atualiza os dados de uma lição existente.
      parameters:
        - name: id
          in: path
          description: ID da Lição
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lesson'
      responses:
        '200':
          description: Lição atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '400':
          description: ID ausente ou inválido
        '404':
          description: Lição não encontrada
    delete:
      tags:
        - Conteúdo
      summary: Deletar uma lição
      description: Remove uma lição do catálogo usando seu ID.
      parameters:
        - name: id
          in: path
          description: ID da Lição
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Lição deletada com sucesso
        '400':
          description: ID ausente ou inválido
        '404':
          description: Lição não encontrada

  /lessons/{id}/questions:
    get:
      tags:
        - Conteúdo
      summary: Listar questões de uma lição
      description: Retorna todas as questões associadas a um ID de lição específico.
      parameters:
        - name: id
          in: path
          description: ID da Lição
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Question'
        '400':
          description: ID inválido fornecido

  /questions/{id}:
    get:
      tags:
        - Conteúdo
      summary: Obter detalhes de uma questão
      description: Retorna os detalhes de uma questão específica.
      parameters:
        - name: id
          in: path
          description: ID da Questão
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '404':
          description: Questão não encontrada
        '400':
          description: ID inválido fornecido
    put:
      tags:
        - Conteúdo
      summary: Atualiza uma questão
      description: Atualiza os dados de uma questão existente.
      parameters:
        - name: id
          in: path
          description: ID da Questão
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Question'
      responses:
        '200':
          description: Questão atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: ID ausente ou inválido
        '404':
          description: Questão não encontrada
    delete:
      tags:
        - Conteúdo
      summary: Deletar uma questão
      description: Remove uma questão do catálogo usando seu ID.
      parameters:
        - name: id
          in: path
          description: ID da Questão
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Questão deletada com sucesso
        '400':
          description: ID ausente ou inválido
        '404':
          description: Questão não encontrada

  /questions:
    post:
      tags:
        - Conteúdo
      summary: Criar uma nova questão
      description: Adiciona uma nova questão ao catálogo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Question'
      responses:
        '201':
          description: Questão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Formato de questão inválido

  /progress/submit:
    post:
      tags:
        - Progresso
      summary: Enviar resposta
      description: Envia uma resposta para uma questão e registra o progresso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: Resposta enviada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswerResponse'
        '404':
          description: Questão não encontrada

  /progress/reset:
    post:
      tags:
        - Progresso
      summary: Reiniciar progresso
      description: Reinicia o progresso de uma lição específica para um usuário.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetProgressRequest'
      responses:
        '200':
          description: Progresso reiniciado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Progresso resetado com sucesso"

  /progress/history/{userId}:
    get:
      tags:
        - Progresso
      summary: Obter histórico do usuário
      description: Retorna uma lista de IDs de lições completadas por um usuário.
      parameters:
        - name: userId
          in: path
          description: ID do Usuário
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  completedLessons:
                    type: array
                    items:
                      type: integer
        '400':
          description: ID de usuário inválido fornecido

components:
  schemas:
    Course:
      type: object
      title: Curso
      properties:
        id:
          type: integer
          description: ID gerado automaticamente pelo servidor
          readOnly: true
        title:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        total_lessons:
          type: integer
          nullable: true

    Lesson:
      type: object
      title: Lição
      properties:
        id:
          type: integer
          description: ID gerado automaticamente pelo servidor
          readOnly: true
        course_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        order:
          type: integer
          nullable: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'

    Question:
      type: object
      title: Questão
      properties:
        id:
          type: integer
          description: ID gerado automaticamente pelo servidor
          readOnly: true
        lesson_id:
          type: integer
        question:
          type: string
        code:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        correct_answer:
          type: integer
        order:
          type: integer
          nullable: true

    SubmitAnswerRequest:
      type: object
      title: Requisição de Envio de Resposta
      required:
        - userId
        - questionId
        - selectedOption
      properties:
        userId:
          type: integer
        questionId:
          type: integer
        selectedOption:
          type: integer

    SubmitAnswerResponse:
      type: object
      title: Resposta do Envio
      properties:
        isCorrect:
          type: boolean
        correctAnswer:
          type: integer
        message:
          type: string

    ResetProgressRequest:
      type: object
      title: Requisição de Reset de Progresso
      required:
        - userId
        - lessonId
      properties:
        userId:
          type: integer
        lessonId:
          type: integer
